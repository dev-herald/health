# Same YAML shape as pnpm 9 / pnpm 10 (lockfileVersion 9.0 in real projects)
lockfileVersion: '9.0'

importers:

  .:
    devDependencies:
      turbo:
        specifier: 2.8.21
        version: 2.8.21

  apps/web:
    dependencies:
      react:
        specifier: ^18.0.0
        version: 18.2.0
    devDependencies:
      eslint:
        specifier: ^8.0.0
        version: 8.57.0

packages:

  react@18.2.0:
    resolution: {integrity: aa}

  eslint@8.57.0:
    resolution: {integrity: bb}

  turbo@2.8.21:
    resolution: {integrity: cc}
