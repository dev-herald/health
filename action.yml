name: 'Code Health - Dev Herald'
description: 'Send CI health data to Dev Herald to power codebase health reports'
branding:
  icon: 'activity'
  color: 'green'

inputs:
  api-key:
    description: 'Dev Herald project API key'
    required: true

  knip-report-path:
    description: 'Path to a Knip JSON report file (optional if a lockfile is present for CVE scanning)'
    required: false
    default: ''

  lockfile-path:
    description: 'Optional path to lockfile; otherwise auto-detects pnpm-lock.yaml, yarn.lock, package-lock.json, or bun.lock (CVE/OSV uses npm and pnpm only; yarn or bun emits a warning and skips CVE)'
    required: false
    default: ''

  cve-detail:
    description: 'If true, fetch per-vulnerability details from OSV for per-issue severity and descriptions plus aggregate severity buckets (slower). If false, still sends vulnerable package names and OSV ids, without severities or descriptions.'
    required: false
    default: 'false'

  api-url:
    description: 'Dev Herald ingest API endpoint'
    required: false
    default: 'https://dev-herald.com/api/v1/health/ingest'

  repository-full-name:
    description: 'owner/repo (defaults to GitHub context)'
    required: false

  commit-sha:
    description: 'Commit SHA (defaults to GitHub context)'
    required: false

  workflow-run-url:
    description: 'Link to the workflow run'
    required: false

  turbopack-bundle-stats-path:
    description: 'Path to a Next bundle artifact: experimental-analyze --output dir (.next/diagnostics/analyze), webpack @next/bundle-analyzer output dir with client.json (analyzerMode json), route-bundle-stats.json (Turbopack), or a single webpack-bundle-analyzer JSON file'
    required: false
    default: ''

outputs:
  report-id:
    description: 'Health report ID'

  status:
    description: 'created or failed'

runs:
  using: 'node20'
  main: 'dist/index.js'
